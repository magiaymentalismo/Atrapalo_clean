name: Update dashboard

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # cada 30 min (UTC)

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Cache de browsers de Playwright para acelerar runs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      # Instala Chromium headless shell + deps del sistema
      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run generator
        env:
          TZ: Europe/Madrid
        run: |
          python generate_dashboard_dinaticket.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update dashboard"
          git push