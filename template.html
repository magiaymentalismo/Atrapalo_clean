<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cartelera — Magia & Teatro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.12);
  --text:#fff;
  --muted:rgba(255,255,255,.6);
  --gold:#ffd700;
  --green:#34c759;
  --red:#ff453a;
  --radius:20px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
}

body{
  margin:0;
  font-family:var(--font);
  background:#000;
  color:#fff;
  padding:40px 16px;
}

.wrap{max-width:1000px;margin:auto}

.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

.tab{
  padding:10px 18px;
  border-radius:999px;
  background:var(--glass);
  border:1px solid var(--border);
  cursor:pointer;
  font-weight:800;
}

.tab.active{
  background:#fff;
  color:#000;
}

.panel{
  background:rgba(20,20,20,.4);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
}

.month{
  color:var(--gold);
  font-weight:900;
  margin:25px 0 10px;
  text-transform:capitalize;
}

.item{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

.date{font-weight:900;font-size:18px}
.time{color:var(--muted);margin-top:4px;font-weight:700}

.chip{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-weight:900;
  border:1px solid var(--border);
}

.chip.gray{background:rgba(255,255,255,.06)}
.chip.green{background:rgba(52,199,89,.15);color:var(--green)}
.chip.gold{background:rgba(255,215,0,.15);color:var(--gold)}
.chip.sold{background:rgba(255,69,58,.15);color:var(--red)}

.abono{
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid var(--border);
}

.abono.ok{background:rgba(52,199,89,.15);color:var(--green)}
.abono.no{background:rgba(255,69,58,.15);color:var(--red)}
</style>
</head>

<body>
<div class="wrap">
  <div id="tabs" class="tabs"></div>
  <div class="panel">
    <div id="list"></div>
  </div>
</div>

<script id="PAYLOAD" type="application/json">{{PAYLOAD_JSON}}</script>

<script>
const payload = JSON.parse(document.getElementById("PAYLOAD").textContent);
const eventos = payload.eventos || {};
let active = Object.keys(eventos)[0];

const tabsEl = document.getElementById("tabs");
for (const sala of Object.keys(eventos)){
  const total = eventos[sala]?.proximas?.table?.rows?.length || 0;
  const btn=document.createElement("button");
  btn.className="tab"+(sala===active?" active":"");
  btn.textContent=`${sala} (${total})`;
  btn.onclick=()=>{active=sala;updateTabs();render();}
  tabsEl.appendChild(btn);
}

function updateTabs(){
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active",t.textContent.startsWith(active));
  });
}

function getRows(){
  return eventos[active]?.proximas?.table?.rows || [];
}

function chipClass(vendidas,stock){
  if(stock===0)return"sold";
  if(vendidas>=10)return"gold";
  if(vendidas>=1)return"green";
  return"gray";
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";
  let rows=getRows();

  rows=rows.map(r=>({
    fecha:r[0],
    hora:r[1],
    vendidas:Number(r[2]),
    fecha_iso:r[3],
    cap:Number(r[4]),
    stock:Number(r[5]),
    abono:r[6]
  }));

  rows.sort((a,b)=>(a.fecha_iso+a.hora).localeCompare(b.fecha_iso+b.hora));

  let currentMonth=null;

  for(const r of rows){
    const d=new Date(r.fecha_iso+"T00:00:00");
    const key=d.getFullYear()+"-"+(d.getMonth()+1);

    if(key!==currentMonth){
      currentMonth=key;
      const h=document.createElement("div");
      h.className="month";
      h.textContent=d.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
      list.appendChild(h);
    }

    const card=document.createElement("div");
    card.className="item";

    const cls=chipClass(r.vendidas,r.stock);
    const value=`${r.vendidas}/${r.cap} · quedan ${r.stock}`;

    let abonoHTML="";
    if(r.abono==="venta")
      abonoHTML=`<div class="abono ok">Abono: Disponible</div>`;
    if(r.abono==="agotado")
      abonoHTML=`<div class="abono no">Abono: Agotado</div>`;

    card.innerHTML=`
      <div class="date">${r.fecha}</div>
      <div class="time">${r.hora} h</div>
      <div class="chip ${cls}">${value}</div>
      ${abonoHTML}
    `;

    list.appendChild(card);
  }
}

render();
</script>
</body>
</html>
