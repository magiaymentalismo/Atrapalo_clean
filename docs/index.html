<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cartelera — Magia & Teatro</title>

  <link rel="manifest" href="manifest.json?v=20260601">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.52);
      --accent-gold: #ffd60a;
      --accent-green: #30d158;
      --accent-red: #ff453a;
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --radius-full: 999px;
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      --safe-top: env(safe-area-inset-top, 20px);
    }

    html, body { max-width: 100%; overflow-x: hidden; }

    body {
      background-color: #08080f;
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 8%, rgba(120, 50, 240, 0.42) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 18%, rgba(20, 100, 255, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse 70% 55% at 50% 92%, rgba(220, 40, 90, 0.32) 0%, transparent 52%),
        radial-gradient(ellipse 50% 40% at 10% 88%, rgba(0, 190, 160, 0.25) 0%, transparent 45%),
        radial-gradient(ellipse 40% 35% at 70% 55%, rgba(255, 160, 20, 0.15) 0%, transparent 40%);
      background-attachment: fixed;
      margin: 0;
      color: var(--text-primary);
      font-family: var(--font-stack);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding-top: calc(var(--safe-top) + 96px);
      padding-bottom: 48px;
    }

    .wrap { max-width: 1040px; margin: 0 auto; padding: 16px; }

    .dynamic-island-container {
      position: fixed;
      top: calc(var(--safe-top) + 8px);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }

    .dynamic-island {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(60px) saturate(200%) brightness(1.08);
      -webkit-backdrop-filter: blur(60px) saturate(200%) brightness(1.08);
      border-radius: 30px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: min(560px, calc(100% - 20px));
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.38),
        inset 0 -1px 0 rgba(255, 255, 255, 0.05),
        inset 1px 0 0 rgba(255, 255, 255, 0.10),
        inset -1px 0 0 rgba(255, 255, 255, 0.05),
        0 16px 48px rgba(0, 0, 0, 0.55),
        0 4px 12px rgba(0, 0, 0, 0.30);
    }

    .dynamic-island::before {
      content: '';
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
      pointer-events: none;
    }

    .island-title {
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }

    .island-meta {
      font-size: 12px;
      color: var(--text-secondary);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      padding-left: 12px;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding: 4px 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      justify-content: center;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 10px 20px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex: 0 0 auto;
      border: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 4px 12px rgba(0, 0, 0, 0.22);
    }

    .tab.active {
      background: rgba(255, 255, 255, 0.90);
      color: #000;
      transform: scale(1.05);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 1),
        0 10px 28px rgba(255, 255, 255, 0.22),
        0 4px 12px rgba(0, 0, 0, 0.30);
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-lg);
      padding: 16px;
      backdrop-filter: blur(70px) saturate(180%);
      -webkit-backdrop-filter: blur(70px) saturate(180%);
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 28px 56px rgba(0, 0, 0, 0.45),
        0 8px 20px rgba(0, 0, 0, 0.22);
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      pointer-events: none;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .month {
      margin: 20px 0 6px;
      font-size: 17px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.42);
      text-transform: capitalize;
      padding-left: 4px;
      letter-spacing: -0.2px;
    }

    .item {
      background: rgba(255, 255, 255, 0.065);
      border-radius: var(--radius-md);
      padding: 16px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 6px 20px rgba(0, 0, 0, 0.28);
    }

    .item:active { transform: scale(0.975); }

    .item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 18%;
      right: 18%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      pointer-events: none;
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .date {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .date span {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-left: 6px;
    }

    .time {
      margin-top: 3px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1px;
      color: var(--text-secondary);
    }

    .chips {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.07);
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 3px 10px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .chip::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      pointer-events: none;
    }

    .chip-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .chip-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      opacity: 0.65;
    }

    .chip-value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip.green {
      background: rgba(48, 209, 88, 0.14);
      box-shadow: inset 0 1px 0 rgba(48, 209, 88, 0.35), 0 3px 10px rgba(48, 209, 88, 0.10);
    }

    .chip.green .chip-title,
    .chip.green .chip-value { color: var(--accent-green); }

    .chip.gold {
      background: rgba(255, 214, 10, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 214, 10, 0.35), 0 3px 10px rgba(255, 214, 10, 0.08);
    }

    .chip.gold .chip-title,
    .chip.gold .chip-value { color: var(--accent-gold); }

    .chip.gray {
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14), 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    .chip.gray .chip-title,
    .chip.gray .chip-value { color: rgba(255, 255, 255, 0.62); }

    .chip.sold {
      background: rgba(255, 69, 58, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 69, 58, 0.30), 0 3px 10px rgba(255, 69, 58, 0.08);
    }

    .chip.sold .chip-title,
    .chip.sold .chip-value { color: var(--accent-red); }

    @media (min-width: 700px) {
      .panel { padding: 20px; }
      .item { padding: 18px; }
    }
  </style>
</head>

<body>

  <div class="dynamic-island-container">
    <div class="dynamic-island">
      <div class="island-title">Cartelera</div>
      <div class="island-meta" id="meta"></div>
    </div>
  </div>

  <div class="wrap">
    <div id="tabs" class="tabs"></div>

    <div class="panel">
      <div id="list" class="list"></div>
    </div>
  </div>

  <script id="PAYLOAD" type="application/json">{"generated_at": "2026-07-19T06:52:33.948488+02:00", "eventos": {"Disfruta": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": [["23 Jul 2026", "21:30", 0, "2026-07-23", 30, 30, null, "dinaticket"], ["30 Jul 2026", "21:30", 0, "2026-07-30", 30, 30, null, "dinaticket"], ["06 Aug 2026", "21:30", 0, "2026-08-06", 30, 30, null, "dinaticket"], ["27 Aug 2026", "21:30", 0, "2026-08-27", 30, 30, null, "dinaticket"]]}, "proximas": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": [["23 Jul 2026", "21:30", 0, "2026-07-23", 30, 30, null, "dinaticket"], ["30 Jul 2026", "21:30", 0, "2026-07-30", 30, 30, null, "dinaticket"], ["06 Aug 2026", "21:30", 0, "2026-08-06", 30, 30, null, "dinaticket"], ["27 Aug 2026", "21:30", 0, "2026-08-27", 30, 30, null, "dinaticket"]]}}}, "Escondi2": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": [["23 Jul 2026", "20:00", 3, "2026-07-23", 30, 27, null, "dinaticket"], ["25 Jul 2026", "17:00", 0, "2026-07-25", 30, 30, null, "dinaticket"], ["26 Jul 2026", "18:30", 2, "2026-07-26", 30, 28, null, "dinaticket"], ["30 Jul 2026", "20:00", 0, "2026-07-30", 30, 30, null, "dinaticket"], ["02 Aug 2026", "18:30", 0, "2026-08-02", 30, 30, null, "dinaticket"], ["06 Aug 2026", "20:00", 0, "2026-08-06", 30, 30, null, "dinaticket"], ["08 Aug 2026", "17:00", 0, "2026-08-08", 30, 30, null, "dinaticket"], ["27 Aug 2026", "20:00", 0, "2026-08-27", 30, 30, null, "dinaticket"], ["29 Aug 2026", "17:00", 0, "2026-08-29", 30, 30, null, "dinaticket"], ["30 Aug 2026", "18:30", 0, "2026-08-30", 30, 30, null, "dinaticket"]]}, "proximas": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": [["23 Jul 2026", "20:00", 3, "2026-07-23", 30, 27, null, "dinaticket"], ["25 Jul 2026", "17:00", 0, "2026-07-25", 30, 30, null, "dinaticket"], ["26 Jul 2026", "18:30", 2, "2026-07-26", 30, 28, null, "dinaticket"], ["30 Jul 2026", "20:00", 0, "2026-07-30", 30, 30, null, "dinaticket"], ["02 Aug 2026", "18:30", 0, "2026-08-02", 30, 30, null, "dinaticket"], ["06 Aug 2026", "20:00", 0, "2026-08-06", 30, 30, null, "dinaticket"], ["08 Aug 2026", "17:00", 0, "2026-08-08", 30, 30, null, "dinaticket"], ["27 Aug 2026", "20:00", 0, "2026-08-27", 30, 30, null, "dinaticket"], ["29 Aug 2026", "17:00", 0, "2026-08-29", 30, 30, null, "dinaticket"], ["30 Aug 2026", "18:30", 0, "2026-08-30", 30, 30, null, "dinaticket"]]}}}, "Miedo": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": []}, "proximas": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": []}}}, "CluedoMental": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": []}, "proximas": {"table": {"headers": ["Fecha", "Hora", "Vendidas", "FechaISO", "Capacidad", "Stock", "BuyUrl", "Source"], "rows": []}}}}}</script>

  <script>
    const payload = JSON.parse(document.getElementById("PAYLOAD").textContent);
    const eventos = payload.eventos || {};
    let active = Object.keys(eventos)[0] || null;

    document.getElementById("meta").textContent =
      new Date(payload.generated_at).toLocaleString("es-ES", {
        hour: "2-digit",
        minute: "2-digit"
      });

    const tabsEl = document.getElementById("tabs");

    for (const sala of Object.keys(eventos)) {
      const ev = eventos[sala];
      const total = ev.proximas?.table?.rows?.length || 0;

      const b = document.createElement("button");
      b.textContent = `${sala} (${total})`;
      b.dataset.tab = sala;
      b.className = "tab" + (sala === active ? " active" : "");
      b.onclick = () => {
        active = sala;
        updateTabs();
        render();
      };

      tabsEl.appendChild(b);
    }

    function updateTabs() {
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.tab === active);
      });
    }

    const DAYS = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];

    function dayName(fechaISO) {
      return DAYS[new Date(fechaISO + "T00:00:00").getDay()];
    }

    function getTable() {
      return eventos[active]?.proximas?.table || { headers: [], rows: [] };
    }

    function colIndex(headers, name, fallback) {
      const idx = headers.indexOf(name);
      return idx >= 0 ? idx : fallback;
    }

    function fmtInt(x) {
      if (x === null || x === undefined || x === "") return null;
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    }

    function chipClassFrom(vendidas, stock) {
      const v = vendidas ?? 0;
      const s = stock ?? 999999;

      if (s === 0) return "sold";
      if (s <= 3) return "gold";
      if (v >= 1) return "green";
      return "gray";
    }

    function sourceLabel(source) {
      if (source === "onebox") return "Onebox";
      if (source === "dinaticket") return "Dina";
      return "Entradas";
    }

    function stockValue(r) {
      const vendidas = r.vendidas ?? "—";
      const cap = r.cap ?? "—";
      const stock = r.stock ?? "—";

      if (r.stock === 0) return `${vendidas}/${cap} · agotado`;

      return `${vendidas}/${cap} · quedan ${stock}`;
    }

    function render() {
      const cont = document.getElementById("list");
      cont.innerHTML = "";

      const table = getTable();
      const headers = table.headers || [];
      const rawRows = table.rows || [];

      const idxFechaLabel = colIndex(headers, "Fecha", 0);
      const idxHora = colIndex(headers, "Hora", 1);
      const idxVendidas = colIndex(headers, "Vendidas", 2);
      const idxFechaISO = colIndex(headers, "FechaISO", 3);
      const idxCapacidad = colIndex(headers, "Capacidad", 4);
      const idxStock = colIndex(headers, "Stock", 5);
      const idxBuyUrl = colIndex(headers, "BuyUrl", 6);
      const idxSource = colIndex(headers, "Source", 7);

      let rows = rawRows.map(r => ({
        fecha_label: r[idxFechaLabel],
        hora: r[idxHora],
        vendidas: fmtInt(r[idxVendidas]),
        fecha_iso: r[idxFechaISO],
        cap: fmtInt(r[idxCapacidad]),
        stock: fmtInt(r[idxStock]),
        buyUrl: r[idxBuyUrl] || null,
        source: r[idxSource] || null
      }));

      rows = rows.filter(r => r.fecha_iso && r.hora);

      rows.sort((a, b) =>
        (a.fecha_iso + a.hora).localeCompare(b.fecha_iso + b.hora)
      );

      if (!rows.length) {
        cont.innerHTML = `
          <div class="item">
            <div class="date">Sin funciones próximas</div>
            <div class="time">No hay fechas disponibles ahora mismo.</div>
          </div>
        `;
        return;
      }

      let currentMonth = null;

      for (const r of rows) {
        const d = new Date(r.fecha_iso + "T00:00:00");
        const key =
          d.getFullYear() + "-" +
          String(d.getMonth() + 1).padStart(2, "0");

        if (key !== currentMonth) {
          currentMonth = key;

          const h = document.createElement("h3");
          h.className = "month";
          h.textContent = d.toLocaleDateString("es-ES", {
            month: "long",
            year: "numeric"
          });

          cont.appendChild(h);
        }

        const chipCls = chipClassFrom(r.vendidas, r.stock);
        const label = sourceLabel(r.source);
        const value = stockValue(r);

        const card = document.createElement("div");
        card.className = "item";

        card.innerHTML = `
          <div class="row-top">
            <div class="date">
              ${r.fecha_label}
              <span>(${dayName(r.fecha_iso)})</span>
            </div>
          </div>

          <div class="time">${r.hora} h</div>

          <div class="chips">
            <div class="chip ${chipCls}">
              <div class="chip-left">
                <div class="chip-title">${label}</div>
                <div class="chip-value">${value}</div>
              </div>
            </div>
          </div>
        `;

        cont.appendChild(card);
      }
    }

    render();
  </script>

  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;

      const RELOAD_KEY = "sw-reloaded-once";

      navigator.serviceWorker.register("sw.js?v=2026-06-01-01").then((reg) => {
        reg.update().catch(() => {});

        function activateWaitingSW() {
          if (!reg.waiting) return;
          reg.waiting.postMessage({ type: "SKIP_WAITING" });
        }

        activateWaitingSW();

        reg.addEventListener("updatefound", () => {
          const sw = reg.installing;
          if (!sw) return;

          sw.addEventListener("statechange", () => {
            if (sw.state === "installed" && navigator.serviceWorker.controller) {
              activateWaitingSW();
            }
          });
        });

        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (sessionStorage.getItem(RELOAD_KEY) === "1") return;
          sessionStorage.setItem(RELOAD_KEY, "1");
          window.location.reload();
        });
      }).catch(console.error);
    })();
  </script>
